<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paint-by-Numbers Generator</title>
  <link rel="stylesheet" href="asset/style.css" />
</head>
<body>

  <!-- Top header bar -->
  <header class="topbar">
    <h1 class="topbar-title">Paint-by-Numbers Generator</h1>
    <p class="topbar-sub">Upload a photo, pick a grid, download printable SVGs.</p>
  </header>

  <main class="page">

    <!-- Upload row -->
    <section class="card upload-card">
      <div class="upload-cols">

        <!-- Left: drop zone -->
        <div class="drop-zone" id="dropZone">
          <p class="drop-main">Drop an image here</p>
          <p class="drop-hint">JPG or PNG · max 20 MB · min 40×60 px</p>
          <label class="btn btn-browse" for="fileInput">Browse files</label>
          <input type="file" id="fileInput" accept="image/jpeg,image/png" hidden />
        </div>

        <!-- Right: preview (hidden until file loaded) -->
        <div class="preview-panel" id="previewPanel" style="display:none;">
          <div class="preview-inner">
            <img id="previewImg" alt="Preview" />
            <div class="preview-meta">
              <span class="preview-filename" id="previewFilename"></span>
              <span class="preview-dims" id="previewDims"></span>
              <button class="btn-clear" id="clearBtn">Clear</button>
            </div>
          </div>
        </div>

      </div>

      <!-- Error -->
      <div class="error-banner" id="errorBanner" style="display:none;">
        <span id="errorText"></span>
        <button class="dismiss-btn" id="dismissError">✕</button>
      </div>
    </section>

    <!-- Controls bar -->
    <section class="card controls-card">
      <div class="controls-row">
        <div class="control-group">
          <label class="control-label" for="layoutSelect">Grid layout</label>
          <div class="select-wrap">
            <select id="layoutSelect" class="layout-select"></select>
          </div>
        </div>
        <div class="control-group">
          <label class="control-label">Grid Size</label>
          <div class="grid-size-inputs">
            <div class="grid-size-field">
              <label class="grid-size-label" for="colsInput">Cols</label>
              <input type="number" id="colsInput" class="grid-size-input" min="4" max="200" value="40" />
            </div>
            <span class="grid-size-sep">×</span>
            <div class="grid-size-field">
              <label class="grid-size-label" for="rowsInput">Rows</label>
              <input type="number" id="rowsInput" class="grid-size-input" min="4" max="200" value="60" />
            </div>
          </div>
        </div>
        <button class="btn btn-generate" id="generateBtn" disabled>Generate</button>
      </div>
    </section>

    <!-- Palette section (shown after generation) -->
    <section class="card palette-card" id="paletteCard" style="display:none;">
      <p class="section-label">PALETTE</p>
      <div class="palette-swatches" id="colorPalette"></div>
    </section>

    <!-- Loading overlay -->
    <div class="loading-overlay" id="loadingOverlay" style="display:none;">
      <div class="loading-card">
        <div class="spinner"></div>
        <p class="loading-text" id="loadingText">Processing image…</p>
      </div>
    </div>

    <!-- Results -->
    <section class="results-row" id="resultsSection" style="display:none;">

      <div class="result-card">
        <div class="result-card-header">
          <span class="result-card-title">Paint-by-Numbers Grid</span>
          <button class="btn btn-download" id="downloadGrid">Download SVG</button>
        </div>
        <div class="canvas-wrap" id="gridPreview"></div>
      </div>

      <div class="result-card">
        <div class="result-card-header">
          <span class="result-card-title">Mosaic Preview</span>
          <button class="btn btn-download" id="downloadMosaic">Download SVG</button>
        </div>
        <div class="canvas-wrap" id="mosaicPreview"></div>
      </div>

    </section>

  </main>

  <script src="asset/app.js"></script>
</body>
</html>
